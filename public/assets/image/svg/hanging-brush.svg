<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 520" fill="none">
  <defs>
    <linearGradient id="wood" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C99A6B"/>
      <stop offset=".45" stop-color="#E5B981"/>
      <stop offset="1" stop-color="#A37749"/>
    </linearGradient>
    <linearGradient id="woodShine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".25"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="ferrule" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8C8E92"/>
      <stop offset=".5" stop-color="#E4E6E9"/>
      <stop offset="1" stop-color="#7C8084"/>
    </linearGradient>
    <linearGradient id="bristle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F4A23A"/>
      <stop offset="1" stop-color="#E0741A"/>
    </linearGradient>
    <linearGradient id="paint" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2BA8F0"/>
      <stop offset="1" stop-color="#1A7CC4"/>
    </linearGradient>
  </defs>

  <!-- Hanger hole -->
  <circle cx="110" cy="22" r="9" fill="#222" opacity=".35"/>
  <circle cx="110" cy="22" r="5.5" fill="#0E1116"/>

  <!-- Wooden handle -->
  <path d="M88 18c0-9 44-9 44 0v210c0 7-44 7-44 0V18z" fill="url(#wood)"/>
  <path d="M99 28c0-3 22-3 22 0v200c0 2-22 2-22 0V28z" fill="url(#woodShine)"/>

  <!-- Ferrule band -->
  <rect x="80" y="228" width="60" height="44" rx="3" fill="url(#ferrule)"/>
  <rect x="80" y="234" width="60" height="3" fill="#5B5E62" opacity=".55"/>
  <rect x="80" y="262" width="60" height="3" fill="#5B5E62" opacity=".55"/>
  <rect x="80" y="246" width="60" height="3" fill="#FFFFFF" opacity=".4"/>

  <!-- Bristle (orange part) -->
  <path d="M76 272h68c2 0 3 1 3 3l-6 50c-1 5-4 8-9 8H88c-5 0-8-3-9-8l-6-50c0-2 1-3 3-3z" fill="url(#bristle)"/>
  <!-- Bristle hairs -->
  <g opacity=".35" stroke="#7A3B0B" stroke-width="1.2">
    <line x1="86" y1="280" x2="84" y2="330"/>
    <line x1="96" y1="280" x2="94" y2="333"/>
    <line x1="106" y1="280" x2="105" y2="335"/>
    <line x1="116" y1="280" x2="116" y2="335"/>
    <line x1="126" y1="280" x2="127" y2="333"/>
    <line x1="136" y1="280" x2="138" y2="330"/>
  </g>

  <!-- Blue paint coat at the tip -->
  <path d="M82 318h60c1 0 2 1 2 2l-5 22c-2 8-7 12-15 12H100c-8 0-13-4-15-12l-5-22c0-1 1-2 2-2z" fill="url(#paint)"/>
  <path d="M82 318c20 6 40 6 60 0v6c-20 6-40 6-60 0v-6z" fill="#1670B4" opacity=".55"/>

  <!-- Drips -->
  <path d="M92 354c0 12-4 18-4 28s4 14 4 14 4-4 4-14-4-16-4-28z" fill="url(#paint)"/>
  <path d="M118 358c0 9-3 14-3 22s3 11 3 11 3-3 3-11-3-13-3-22z" fill="url(#paint)"/>
  <path d="M134 354c0 14-4 22-4 34s4 17 4 17 4-5 4-17-4-20-4-34z" fill="url(#paint)"/>

  <!-- Small drop falling -->
  <ellipse cx="115" cy="412" rx="4" ry="6" fill="#1A7CC4"/>
</svg>
